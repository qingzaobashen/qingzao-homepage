<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 青蓝色渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <!-- Q字母的白色渐变 -->
    <linearGradient id="qGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f7fa;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- 青蓝色圆角矩形背景 -->
  <rect x="5" y="5" width="90" height="90" rx="20" ry="20" fill="url(#bgGrad)"/>
  <!-- 艺术字 Q：由圆形和尾巴组成 -->
  <g filter="url(#shadow)">
    <!-- Q的主圆环 -->
    <path d="M 50 22
             A 24 24 0 1 1 49.99 22
             M 50 32
             A 14 14 0 1 0 50.01 32 Z"
          fill="url(#qGrad)" fill-rule="evenodd"/>
    <!-- Q的尾巴（艺术化斜线） -->
    <path d="M 60 60
             L 75 75
             L 70 80
             L 55 65 Z"
          fill="url(#qGrad)"/>
    <!-- 尾巴的细线条装饰 -->
    <path d="M 63 57
             L 78 72"
          stroke="url(#qGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
